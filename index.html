<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Điểm Phát Âm Anh-Mỹ - 4 Câu Luyện Tập</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 650px; margin: 40px auto; text-align: center; background: #eef2f3; color: #333; }
        .container { background: white; padding: 35px 30px; border-radius: 16px; box-shadow: 0 5px 25px rgba(0,0,0,0.06); }
        
        /* Bộ chọn câu hỏi */
        .navigation-box { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 10px 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .select-custom { padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 14px; outline: none; background: white; cursor: pointer; }
        .btn-nav { background: #64748b; color: white; padding: 8px 16px; font-size: 14px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-nav:hover { background: #475569; }
        
        /* Khung hiển thị câu */
        .sentence-container { margin: 25px 0; }
        .label-hint { font-size: 13px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .sentence { font-size: 24px; font-weight: bold; color: #1e293b; margin-top: 5px; line-height: 1.5; background: #f1f5f9; padding: 20px; border-radius: 12px; border: 2px solid #cbd5e1; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        
        /* Nút bấm điều khiển */
        .controls { margin: 25px 0; }
        button.action-btn { font-size: 16px; font-weight: bold; padding: 14px 32px; margin: 0 10px; border: none; border-radius: 50px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.08); }
        .btn-start { background: #4285F4; color: white; } /* Google Blue */
        .btn-start:hover { background: #357ae8; transform: translateY(-1px); }
        .btn-stop { background: #ea4335; color: white; } /* Google Red */
        .btn-stop:hover { background: #d93025; transform: translateY(-1px); }
        button:disabled { background: #cbd5e1 !important; cursor: not-allowed; box-shadow: none !important; color: #94a3b8 !important; transform: none !important; }
        
        .status-text { margin-top: 15px; font-style: italic; color: #64748b; min-height: 22px; font-size: 15px; }
        
        /* Khung kết quả */
        .result-box { margin-top: 35px; text-align: left; display: none; background: #f8fafc; padding: 25px; border-radius: 12px; border-left: 6px solid #4285F4; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .result-header h3 { margin: 0; color: #1e293b; }
        .score-circle { width: 85px; height: 85px; border-radius: 50%; background: #4285F4; color: white; font-size: 26px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(66, 133, 244, 0.25); }
        .text-compare { font-size: 15px; line-height: 1.7; }
        .text-compare p { margin: 8px 0; }
        .highlight-text { font-weight: 600; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Luyện Phát Âm Anh-Mỹ (en-US)</h2>
    
    <div class="navigation-box">
        <div>
            <label for="sentence-select" style="font-size: 14px; font-weight: bold; color: #475569;">Chọn câu: </label>
            <select id="sentence-select" class="select-custom" onchange="changeSentence(this.value)">
                <option value="0">Câu 1 (Từ tủ lạnh)</option>
                <option value="1">Câu 2 (Từ Vehicle)</option>
                <option value="2">Câu 3 (Giao tiếp thông thường)</option>
                <option value="3">Câu 4 (Học thuật phức tạp)</option>
            </select>
        </div>
        <button id="btn-next" class="btn-nav" onclick="nextSentence()">Câu tiếp theo ➡️</button>
    </div>

    <div class="sentence-container">
        <div class="label-hint">Hãy đọc to câu tiếng Anh dưới đây:</div>
        <div class="sentence" id="ref-text">Đang tải câu hỏi...</div>
    </div>

    <div class="controls">
        <button id="btn-start" class="action-btn btn-start">🎤 Bắt đầu nói</button>
        <button id="btn-stop" class="action-btn btn-stop" disabled>🛑 Dừng & Chấm điểm</button>
    </div>

    <div id="status" class="status-text">Sẵn sàng.</div>

    <div class="result-box" id="result-box">
        <div class="result-header">
            <h3>📊 Kết quả phân tích AI</h3>
            <div class="score-circle" id="score-total">0%</div>
        </div>
        
        <div class="text-compare">
            <p>📌 <b>Câu gốc hệ thống yêu cầu:</b><br><span class="highlight-text" style="background: #e2e8f0; color: #334155;" id="txt-original"></span></p>
            <p>🗣️ <b>Máy nghe được bạn đọc:</b><br><span class="highlight-text" style="background: #e0f2fe; color: #0369a1;" id="txt-recognized"></span></p>
        </div>
    </div>
</div>

<script>
    // 1. Khởi tạo bộ dữ liệu 4 câu theo yêu cầu
    const sentenceData = [
        "Please put the milk and fresh fruits into the refrigerator.", // Câu 1: Có từ tủ lạnh (Refrigerator)
        "The electric vehicle is parked outside the main entrance.",    // Câu 2: Có từ phương tiện (Vehicle)
        "It is important to practice speaking English every single day.", // Câu 3: Câu thông thường
        "Artificial intelligence is transforming the way we work and live." // Câu 4: Câu học thuật
    ];

    let currentIndex = 0;
    let recognition;

    // Kiểm tra tính tương thích của trình duyệt với Web Speech API
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Vui lòng chạy trên Google Chrome hoặc Microsoft Edge!");
    } else {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // Ép buộc nhận diện theo tiêu chuẩn tiếng Anh-Mỹ
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
    }

    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    const statusText = document.getElementById('status');
    const refTextElement = document.getElementById('ref-text');
    const sentenceSelect = document.getElementById('sentence-select');

    // Hàm cập nhật câu hiển thị lên màn hình
    function updateSentence() {
        refTextElement.innerText = sentenceData[currentIndex];
        sentenceSelect.value = currentIndex;
        document.getElementById('result-box').style.display = 'none';
        statusText.innerText = "Đã chuyển sang câu số " + (currentIndex + 1) + ". Sẵn sàng nghe.";
    }

    // Xử lý khi người dùng chọn câu từ dropdown
    function changeSentence(index) {
        currentIndex = parseInt(index);
        updateSentence();
    }

    // Xử lý khi bấm nút "Câu tiếp theo"
    function nextSentence() {
        currentIndex = (currentIndex + 1) % sentenceData.length;
        updateSentence();
    }

    // Khởi tạo câu đầu tiên khi trang vừa tải xong
    window.onload = () => {
        updateSentence();
    };

    // Sự kiện khi bấm nút Bắt đầu nói
    btnStart.onclick = () => {
        if (!recognition) return;
        try {
            recognition.start();
            statusText.innerText = "⏳ Hệ thống đang lắng nghe... Hãy đọc to câu trên!";
            btnStart.disabled = true;
            btnStop.disabled = false;
            document.getElementById('result-box').style.display = 'none';
        } catch (e) {
            console.error(e);
        }
    };

    // Sự kiện khi bấm nút Dừng nói
    btnStop.onclick = () => {
        if (!recognition) return;
        recognition.stop();
        statusText.innerText = "⏳ Đang phân tích âm học giọng Mỹ...";
        btnStart.disabled = false;
        btnStop.disabled = true;
    };

    // Xử lý kết quả trả về từ bộ nhận diện của Google
    if (recognition) {
        recognition.onresult = (event) => {
            const resultText = event.results[0][0].transcript; 
            const confidence = event.results[0][0].confidence; 
            const currentRefText = sentenceData[currentIndex];

            // Sử dụng thuật toán so sánh chuỗi văn bản Levenshtein để chấm điểm %
            const similarityScore = calculateSimilarity(currentRefText, resultText);
            
            // Công thức tổ hợp giữa độ trùng khớp chữ (70%) + độ rõ nét âm thanh mà Google đánh giá (30%)
