<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Điểm Phát Âm Giọng Mỹ - Google Core</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 50px auto; text-align: center; background: #eef2f3; color: #333; }
        .container { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        .sentence { font-size: 26px; font-weight: bold; color: #2c3e50; margin: 25px 0; line-height: 1.4; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px dashed #cbd5e1; }
        button { font-size: 16px; font-weight: bold; padding: 14px 28px; margin: 10px; border: none; border-radius: 25px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-start { background: #4285F4; color: white; } /* Google Blue */
        .btn-start:hover { background: #357ae8; }
        .btn-stop { background: #ea4335; color: white; } /* Google Red */
        .btn-stop:hover { background: #d93025; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; color: #94a3b8; }
        .status-text { margin-top: 15px; font-style: italic; color: #64748b; min-height: 20px; }
        
        .result-box { margin-top: 35px; text-align: left; display: none; background: #f1f5f9; padding: 20px; border-radius: 8px; border-left: 6px solid #4285F4; }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; background: #4285F4; color: white; font-size: 32px; font-weight: bold; display: flex; align-items: center; justify-content: center; margin: 15px auto; box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3); }
        .text-compare { margin-top: 15px; font-size: 15px; line-height: 1.6; }
        .text-compare span { font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Luyện Phát Âm Anh-Mỹ (Google Web Speech)</h2>
    <p>Hãy nhấn nút ghi âm và đọc to câu tiếng Anh sau:</p>
    
    <div class="sentence" id="ref-text">I love learning English with artificial intelligence.</div>

    <button id="btn-start" class="btn-start">🎤 Bắt đầu nói</button>
    <button id="btn-stop" class="btn-stop" disabled>🛑 Dừng & Chấm điểm</button>

    <div id="status" class="status-text">Sẵn sàng nhận diện.</div>

    <div class="result-box" id="result-box">
        <h3 style="text-align: center; margin-top:0;">📊 Kết quả điểm số</h3>
        <div class="score-circle" id="score-total">0%</div>
        
        <div class="text-compare">
            📌 <b>Câu gốc:</b> <span style="color: #475569;" id="txt-original"></span><br>
            🗣️ <b>Máy nghe được:</b> <span style="color: #0284c7;" id="txt-recognized"></span>
        </div>
    </div>
</div>

<script>
    // Kiểm tra xem trình duyệt có hỗ trợ Web Speech API không (Hỗ trợ tốt nhất trên Chrome, Edge, Safari)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Vui lòng dùng Google Chrome hoặc Microsoft Edge!");
    }

    const recognition = new SpeechRecognition();
    // Cấu hình ngôn ngữ chuẩn Anh - Mỹ (en-US)
    recognition.lang = 'en-US'; 
    recognition.interimResults = false; // Chỉ lấy kết quả cuối cùng khi nói xong
    recognition.maxAlternatives = 1;

    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    const statusText = document.getElementById('status');
    const refText = document.getElementById('ref-text').innerText;

    btnStart.onclick = () => {
        try {
            recognition.start();
            statusText.innerText = "⏳ Hệ thống đang nghe... Hãy đọc câu trên!";
            btnStart.disabled = true;
            btnStop.disabled = false;
            document.getElementById('result-box').style.display = 'none';
        } catch (e) {
            console.error(e);
        }
    };

    btnStop.onclick = () => {
        recognition.stop();
        statusText.innerText = "⏳ Đang tính toán điểm số...";
        btnStart.disabled = false;
        btnStop.disabled = true;
    };

    // Khi người dùng dừng nói hoặc hệ thống nhận diện xong
    recognition.onresult = (event) => {
        const resultText = event.results[0][0].transcript; // Đoạn text Google nhận diện được
        const confidence = event.results[0][0].confidence; // Độ tự tin của Google (từ 0 đến 1)

        // Tính toán điểm số dựa trên thuật toán Levenshtein (so sánh độ giống nhau của 2 chuỗi text)
        const similarityScore = calculateSimilarity(refText, resultText);
        
        // Kết hợp điểm giống nhau của chữ + độ rõ ràng của âm thanh (Confidence) để ra điểm cuối
        let finalScore = Math.round((similarityScore * 0.7) + (confidence * 100 * 0.3));
        if (finalScore > 100) finalScore = 100;

        // Hiển thị kết quả lên màn hình
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score-total').innerText = finalScore + "%";
        document.getElementById('txt-original').innerText = refText;
        document.getElementById('txt-recognized').innerText = resultText;
        
        statusText.innerText = "✅ Đã chấm điểm xong!";
        btnStart.disabled = false;
        btnStop.disabled = true;
    };

    recognition.onerror = (event) => {
        statusText.innerText = "❌ Không nghe rõ hoặc bị lỗi: " + event.error;
        btnStart.disabled = false;
        btnStop.disabled = true;
    };

    recognition.onend = () => {
        if (btnStart.disabled) { 
            statusText.innerText = "Hệ thống dừng nghe.";
            btnStart.disabled = false;
            btnStop.disabled = true;
        }
    };

    // Hàm thuật toán tính toán % giống nhau giữa 2 chuỗi văn bản
    function calculateSimilarity(str1, str2) {
        const s1 = str1.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
        const s2 = str2.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
        
        if (s1 === s2) return 100;
        if (s1.length === 0 || s2.length === 0) return 0;

        const editDistance = levenshteinDistance(s1, s2);
        const longestLength = Math.max(s1.length, s2.length);
        
        return ((longestLength - editDistance) / longestLength) * 100;
    }

    // Thuật toán Levenshtein Distance
    function levenshteinDistance(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) === a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j - 1] + 1, // thay thế
                        matrix[i][j - 1] + 1,     // chèn
                        matrix[i - 1][j] + 1      // xóa
                    );
                }
            }
        }
        return matrix[b.length][a.length];
    }
</script>

</body>
</html>
